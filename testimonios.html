<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Testimonios · ODONTOLOGA: Luz Micaela Rodriguez</title>
<link rel="stylesheet" href="styles.css">

<style>
/* --- ESTILO DE TARJETAS (Actualizado con textura) --- */
.review-card {
    position: relative;
    /* Aplicamos la textura de agua igual que en pacientes.html */
    background-image: linear-gradient(rgba(255, 255, 255, 0.7), rgba(255, 255, 255, 0.7)), url('img/texturas/agua1.png');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;

    border: 1.5px solid rgba(255,255,255,0.55);
    border-radius: 20px;
    padding: 26px 20px;
    box-shadow: 0 10px 26px rgba(0,0,0,0.18);
    transition: 0.35s ease;
    overflow: hidden;
    text-align: center; /* Centramos el contenido */
}

.review-card:hover {
    transform: translateY(-6px);
    box-shadow: 0 16px 36px rgba(0,0,0,0.28);
}

/* --- FOTO RECTANGULAR --- */
.review-photo {
    width: 100%;
    height: 180px;
    object-fit: cover;
    border-radius: 12px;
    border: 3px solid white;
    margin-bottom: 15px;
    background-color: #eee;
}

.review-stars {
    font-size: 1.2rem;
    color: #ffcc00;
    margin-bottom: 10px;
}

.review-text {
    font-size: 0.95rem;
    color: #003366;
    margin-bottom: 12px;
    line-height: 1.4;
    font-style: italic;
}

.review-name {
    font-weight: 700;
    color: #002a5c;
    margin-top: 8px;
    font-family: sans-serif;
}

.reviews-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 26px;
    margin-top: 40px;
}

/* Estilos para el formulario */
#formTestimonio {
    max-width: 500px;
    margin: 0 auto;
    background: #f9f9f9;
    padding: 20px;
    border-radius: 15px;
    text-align: left;
}
#formTestimonio label { display: block; margin-top: 10px; font-weight: bold; }
#formTestimonio input, #formTestimonio textarea { width: 100%; padding: 8px; margin-top: 5px; border-radius: 5px; border: 1px solid #ccc; }
.btn-cta { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-top: 15px; width: 100%; }
</style>
</head>

<body>

<header class="site-header">
  <div class="container">
    <div class="brand">ODONTOLOGA: Luz Micaela Rodriguez</div>
    <nav>
      <a href="index.html">Inicio</a>
      <a href="servicios.html">Servicios</a>
      <a href="equipo.html">Equipo</a>
      <a href="pacientes.html">Pacientes</a>
      <a href="blog.html">Blog</a>
    </nav>
  </div>
</header>

<main class="container" style="padding: 40px 20px; text-align: center;">

    <h1>Testimonios de Pacientes</h1>
    <p>Gracias por compartir tu experiencia con nosotros.</p>

    <section id="formulario">
      <h2>Dejar un testimonio</h2>
      <form id="formTestimonio">
        <label>Nombre y Apellido:</label>
        <input type="text" id="nombre" required>
        <label>Testimonio:</label>
        <textarea id="texto" required></textarea>
        <label>Foto (opcional):</label>
        <input type="file" id="foto" accept="image/*">
        <label style="font-weight: normal; margin-top: 15px;">
          <input type="checkbox" id="permiso" required> Autorizo el uso de mi testimonio
        </label>
        <button type="submit" class="btn-cta">Enviar testimonio</button>
      </form>
      <p id="mensaje"></p>
    </section>

    <hr style="margin: 50px 0; border: 0; border-top: 1px solid #eee;">

    <section class="testimonios-section">
        <h2>Testimonios aprobados</h2>
        <div id="listaTestimonios" class="reviews-grid">
            </div>
    </section>

</main>

<script>
(function() {
    // Tu URL de Google Apps Script
    var LA_URL_SECRETA = "https://script.google.com/macros/s/AKfycbzXpRyxKYpH9tYsHTst431nMVCWNkiUy98XN06gi6UX_a1UWVNwanT2FxG7csPzttu7/exec";

    async function cargarTestimoniosFinal() {
        var elDiv = document.getElementById('listaTestimonios');
        if (!elDiv) return;

        try {
            // FORZAMOS QUE EL CONTENEDOR SEA VISIBLE
            elDiv.style.display = "block";
            elDiv.style.visibility = "visible";
            elDiv.style.opacity = "1";
            elDiv.style.minHeight = "500px";
            elDiv.innerHTML = "<p style='text-align:center; color: #003366;'>Dibujando testimonios en pantalla...</p>";

            var peticion = await fetch(LA_URL_SECRETA + "?v=" + Date.now());
            var elTextoBruto = await peticion.text();
            var losDatosLimpios = JSON.parse(elTextoBruto);

            var listaFinal = Array.isArray(losDatosLimpios) ? losDatosLimpios : (losDatosLimpios.data || []);
            
            elDiv.innerHTML = ""; // Limpiamos

            for (var m = 0; m < listaFinal.length; m++) {
                var uno = listaFinal[m];
                if (!uno.nombre && !uno.texto) continue;

                var linkFoto = "https://www.w3schools.com/howto/img_avatar.png";
                var match = uno.foto ? uno.foto.match(/id=([a-zA-Z0-9_-]+)/) : null;
                if (match && match[1]) {
                    linkFoto = "https://lh3.googleusercontent.com/d/" + match[1];
                }

                var elementoCard = document.createElement('div');
                elementoCard.className = "review-card";
                
                // --- ESTILOS FORZADOS (Para que se vean sí o sí) ---
                elementoCard.style.cssText = `
                    display: inline-block !important;
                    visibility: visible !important;
                    opacity: 1 !important;
                    width: 300px;
                    margin: 15px;
                    padding: 25px;
                    border-radius: 20px;
                    border: 1px solid #007bff;
                    background-image: linear-gradient(rgba(255, 255, 255, 0.8), rgba(255, 255, 255, 0.8)), url('img/texturas/agua1.png');
                    background-size: cover;
                    box-shadow: 0 10px 20px rgba(0,0,0,0.1);
                    vertical-align: top;
                    text-align: center;
                `;

                var contenido = "";
                contenido += '<img src="' + linkFoto + '" style="width:120px; height:120px; border-radius:15px; object-fit:cover; border:3px solid white; margin-bottom:15px;">';
                contenido += '<div style="color:#ffcc00; font-size:1.2rem; margin-bottom:10px;">★★★★★</div>';
                contenido += '<p style="color:#003366; font-style:italic; line-height:1.4;">"' + (uno.texto || "") + '"</p>';
                contenido += '<h4 style="color:#002a5c; margin-top:15px; font-weight:bold;">' + (uno.nombre || "Paciente") + '</h4>';
                
                elementoCard.innerHTML = contenido;
                elDiv.appendChild(elementoCard);
            }
            console.log("¡TERMINADO! Si no los ves, revisa si hay un div encima tapándolos.");
        } catch (e) {
            console.error("Error:", e);
            elDiv.innerHTML = "<p>Error al mostrar.</p>";
        }
    }

    // Ejecutar al cargar la página
    window.addEventListener('load', cargarTestimoniosFinal);
})();
</script>

</body>
</html>
