<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Testimonios · ODONTOLOGA: Luz Micaela Rodriguez</title>
<link rel="stylesheet" href="styles.css">

<style>
/* --- Copiamos el estilo premium de pacientes.html --- */
.review-card {
    position: relative;
    background:
        linear-gradient(135deg,
            rgba(255,255,255,0.55),
            rgba(255,255,255,0.25)
        ),
        url('img/texturas/agua1.png');
    background-size: 180%;
    background-position: center;

    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);

    border: 1.5px solid rgba(255,255,255,0.55);
    border-radius: 20px;

    padding: 26px 20px;
    box-shadow: 0 10px 26px rgba(0,0,0,0.18);
    transition: 0.35s ease;
    overflow: hidden;
}

.review-card:hover {
    transform: translateY(-6px);
    box-shadow: 0 16px 36px rgba(0,0,0,0.28);
    background-size: 200%;
}

/* --- FOTO RECTANGULAR CON BORDE BLANCO --- */
.review-photo {
    width: 100%;
    height: 160px;
    object-fit: cover;
    border-radius: 10px;
    border: 2px solid white;
    margin-bottom: 12px;
}

/* --- Estrellas --- */
.review-stars {
    font-size: 1.2rem;
    color: #ffcc00;
    margin-bottom: 10px;
}

/* --- Texto --- */
.review-text {
    font-size: 0.95rem;
    color: #003366;
    margin-bottom: 12px;
    line-height: 1.4;
}

/* --- Nombre --- */
.review-name {
    font-weight: 700;
    color: #002a5c;
    margin-top: 8px;
}

/* --- Brillo animado --- */
.review-card::after {
    content: "";
    position: absolute;
    top: -120%;
    left: -120%;
    width: 250%;
    height: 250%;
    background: linear-gradient(
        135deg,
        rgba(255,255,255,0) 40%,
        rgba(255,255,255,0.35) 50%,
        rgba(255,255,255,0) 60%
    );
    transform: rotate(15deg);
    opacity: 0;
    transition: opacity 0.4s ease;
}

.review-card:hover::after {
    opacity: 1;
    animation: shineMove 1.2s ease forwards;
}

@keyframes shineMove {
    from { transform: translateX(-50%) translateY(-50%) rotate(15deg); }
    to   { transform: translateX(50%) translateY(50%) rotate(15deg); }
}

/* --- Grilla igual que pacientes.html --- */
.reviews-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 26px;
    margin-top: 40px;
}
</style>
</head>

<body>

<header class="site-header">
  <div class="container">
    <div class="brand">ODONTOLOGA: Luz Micaela Rodriguez</div>
    <nav>
      <a href="index.html">Inicio</a>
      <a href="servicios.html">Servicios</a>
      <a href="equipo.html">Equipo</a>
      <a href="pacientes.html">Pacientes</a>
      <a href="blog.html">Blog</a>
    </nav>
    <a class="btn-cta" href="contacto.html#reserva">Reservar</a>
  </div>
</header>

<main class="container">

<h1>Testimonios de Pacientes</h1>
<p>Gracias por compartir tu experiencia. Tu opinión ayuda a otros pacientes a confiar en su sonrisa.</p>

<!-- ⭐⭐⭐ FORMULARIO ⭐⭐⭐ -->
<section id="formulario" style="margin-top:40px;">
  <h2>Dejar un testimonio</h2>

  <form id="formTestimonio">

    <label>Nombre y Apellido (o inicial):</label>
    <input type="text" id="nombre" required>

    <label>Testimonio:</label>
    <textarea id="texto" required></textarea>

    <label>Foto (opcional):</label>
    <input type="file" id="foto" accept="image/*">

    <label class="permiso">
      <input type="checkbox" id="permiso" required>
      Autorizo el uso de mi testimonio y/o foto
    </label>

    <button type="submit" class="btn-cta">Enviar testimonio</button>
  </form>

  <p id="mensaje"></p>
</section>

<!-- ⭐⭐⭐ LISTA DINÁMICA DE TESTIMONIOS ⭐⭐⭐ -->
<section class="testimonios-section">
    <h2 class="titulo-seccion">Testimonios aprobados</h2>

    <div id="listaTestimonios" class="reviews-grid">
        <!-- Aquí se insertan automáticamente las cards -->
    </div>
</section>

</main>

<script>
/* --- Enviar testimonio al Apps Script --- */
document.getElementById("formTestimonio").addEventListener("submit", async function(e){
    e.preventDefault();

    const nombre = document.getElementById("nombre").value.trim();
    const texto = document.getElementById("texto").value.trim();
    const permiso = document.getElementById("permiso").checked;
    const fotoInput = document.getElementById("foto").files[0];

    if (!permiso) {
        document.getElementById("mensaje").textContent =
          "Debes autorizar el uso del testimonio para enviarlo.";
        return;
    }

    let fotoBase64 = "";
    let fotoTipo = "";
    let fotoNombre = "";

    if (fotoInput) {
        const reader = new FileReader();
        const fileLoaded = new Promise(resolve => reader.onload = resolve);
        reader.readAsDataURL(fotoInput);
        await fileLoaded;

        const base64 = reader.result.split(",")[1];
        fotoBase64 = base64;
        fotoTipo = fotoInput.type;
        fotoNombre = fotoInput.name;
    }

    const payload = { nombre, texto, foto: fotoBase64, fotoTipo, fotoNombre };

    await fetch("https://script.google.com/macros/s/AKfycbyT69LnShOSR9ImTqlin0RHLu-WdPMTB9H0i0ScFKZrm-K1LME_cuyvwRAfyA7URFA/exec", {
        method: "POST",
        body: JSON.stringify(payload)
    });

    document.getElementById("mensaje").textContent =
      "Gracias por tu testimonio. Será revisado y publicado.";
    document.getElementById("formTestimonio").reset();
});

/* --- Cargar testimonios desde Apps Script (GET) --- */
async function cargarTestimonios() {

    const url = "https://script.google.com/macros/s/AKfycbyT69LnShOSR9ImTqlin0RHLu-WdPMTB9H0i0ScFKZrm-K1LME_cuyvwRAfyA7URFA/exec";

    try {
        const resp = await fetch(url);
        const data = await resp.json();

        // Ordenar por ID descendente (más recientes primero)
        data.sort((a, b) => b.id - a.id);

        const cont = document.getElementById("listaTestimonios");
        cont.innerHTML = "";

        data.forEach(t => {
            const card = document.createElement("div");
            card.className = "review-card";
            card.innerHTML = `
                <img src="${t.foto}" class="review-photo">
                <div class="review-stars">★★★★★</div>
                <p class="review-text">“${t.texto}”</p>
                <h4 class="review-name">${t.nombre}</h4>
            `;
            cont.appendChild(card);
        });

        /* --- Animación premium (fade + slide + stagger) --- */
        const cards = document.querySelectorAll(".review-card");
        cards.forEach((card, i) => {
            setTimeout(() => {
                card.classList.add("visible");
            }, i * 120);
        });

    } catch (e) {
        console.log("No se pudo cargar testimonios aún.", e);
    }
}

cargarTestimonios();
</script>

</body>
</html>
